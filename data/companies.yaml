# Company Registry for Taiwan Earnings Call Audio Resolution
#
# Each company entry defines:
#   - Basic metadata (ticker, name, exchange, sector)
#   - market_type: "sii" (listed) or "otc" (OTC) — maps to MOPS TYPEK param
#   - audio.strategies: ordered list of strategies to try for finding audio
#
# Adding a new company = adding a YAML entry here. Zero code changes needed.
#
# Strategy reference:
#   hinet_ott  — HiNet OTT Live HLS streams (slug + cdn_host required)
#   ir_page    — Scrape company IR page (url_template, link_text, follow_links)
#   mops_link  — Direct URLs from MOPS webcast/video columns

companies:
  # ── Top TWSE Companies ──────────────────────────────────────────────

  - ticker: "2330"
    name: "TSMC"
    name_local: "台積電"
    exchange: "TWSE"
    market_type: "sii"
    sector: "Semiconductors"
    gics_sub_industry: "Semiconductors"
    market_cap_usd_b: 900
    language: "zh"
    ir_url: "https://investor.tsmc.com"
    audio:
      strategies:
        - name: "hinet_ott"
          params:
            slug: "tsmc"
            cdn_host: "tsmcvod-ott2b.cdn.hinet.net"
        - name: "ir_page"
          params:
            url_template: "https://investor.tsmc.com/chinese/quarterly-results/{year}/q{quarter}"
            link_text: "線上會議影音重播"
            follow_links: true

